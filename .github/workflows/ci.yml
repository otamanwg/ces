name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: city
          POSTGRES_PASSWORD: city_dev_password
          POSTGRES_DB: city_game
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U city -d city_game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CITY_DATABASE_URL: postgresql+psycopg2://city:city_dev_password@127.0.0.1:5432/city_game
      CITY_TEST_DATABASE_URL: postgresql+psycopg2://city:city_dev_password@127.0.0.1:5432/city_game_test
      CITY_CORS_ORIGINS: "*"
      CITY_DEBUG: "true"
      PGPASSWORD: city_dev_password

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create test database
        run: |
          psql -h 127.0.0.1 -U city -d city_game -c "CREATE DATABASE city_game_test;"

      - name: Install backend dependencies
        run: |
          uv sync --extra dev

      - name: Run migrations
        run: |
          uv run python -m alembic upgrade head

      - name: Lint and typecheck backend
        run: |
          uv run ruff check backend/app backend/main.py
          uv run ruff format --check backend/app backend/main.py
          uv run pyright backend/app backend/main.py
          uv run python scripts/check_secrets.py

      - name: Validate production Compose
        env:
          POSTGRES_PASSWORD_FILE: ./secrets/postgres_password.example.txt
          REDIS_PASSWORD_FILE: ./secrets/redis_password.example.txt
          CITY_DATABASE_URL_FILE: ./secrets/city_database_url.example.txt
          REDIS_URL_FILE: ./secrets/redis_url.example.txt
          CITY_CORS_ORIGINS: https://ci.example.test
          GRAFANA_ADMIN_PASSWORD_FILE: ./secrets/grafana_admin_password.example.txt
        run: docker compose -f docker-compose.prod.yml config --quiet

      - name: Run backend tests
        run: |
          uv run python -m pytest backend/tests -v --tb=short 2>&1

  client:
    name: Godot C# build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore client
        run: dotnet restore client/city_economic_simulator.csproj

      - name: Run client logic tests
        run: dotnet run --project client_tests/ClientLogicTests.csproj -c Debug

      - name: Build client
        run: dotnet build client/city_economic_simulator.csproj -c Debug --no-restore
