name: CI

on:
  push:
  pull_request:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: city
          POSTGRES_PASSWORD: city_dev_password
          POSTGRES_DB: city_game
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U city -d city_game"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    env:
      CITY_DATABASE_URL: postgresql+psycopg2://city:city_dev_password@127.0.0.1:5432/city_game
      CITY_TEST_DATABASE_URL: postgresql+psycopg2://city:city_dev_password@127.0.0.1:5432/city_game_test
      CITY_CORS_ORIGINS: "*"
      CITY_DEBUG: "true"
      PGPASSWORD: city_dev_password

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Create test database
        run: |
          psql -h 127.0.0.1 -U city -d city_game -c "CREATE DATABASE city_game_test;"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r backend/requirements-dev.txt

      - name: Run migrations
        run: |
          python -m alembic upgrade head

      - name: Run backend tests
        run: |
          python -m pytest backend/tests -q

  client:
    name: Godot C# build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"

      - name: Restore client
        run: dotnet restore client/city_economic_simulator.csproj

      - name: Build client
        run: dotnet build client/city_economic_simulator.csproj -c Debug --no-restore
