services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-city}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-city_game}
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-city} -d ${POSTGRES_DB:-city_game}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ces_network

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - sh
      - -c
      - |
        redis_password="$$(tr -d '\r\n' < /run/secrets/redis_password)"
        printf 'appendonly yes\nrequirepass %s\n' "$$redis_password" > /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$(tr -d '\r\n' < /run/secrets/redis_password)\" redis-cli ping | grep PONG"]
      interval: 10s
      timeout: 3s
      retries: 5
    secrets:
      - redis_password
    networks:
      - ces_network

  migrate:
    image: ${CITY_RELEASE_IMAGE:?CITY_RELEASE_IMAGE is required}
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        CITY_RELEASE_SHA: ${CITY_RELEASE_SHA:?CITY_RELEASE_SHA is required}
        CITY_RELEASE_IMAGE: ${CITY_RELEASE_IMAGE:?CITY_RELEASE_IMAGE is required}
        CITY_RELEASE_VERSION: ${CITY_RELEASE_VERSION:?CITY_RELEASE_VERSION is required}
    restart: "no"
    command: ["python", "-m", "alembic", "upgrade", "head"]
    environment:
      CITY_ENV: production
      CITY_DATABASE_URL_FILE: /run/secrets/city_database_url
      REDIS_URL_FILE: /run/secrets/redis_url
      CITY_CORS_ORIGINS: ${CITY_CORS_ORIGINS:?CITY_CORS_ORIGINS is required}
      CITY_DEBUG: "false"
      CITY_ENABLE_FROZEN_ROUTES: "false"
      CITY_RUN_MIGRATIONS_ON_STARTUP: "false"
      CITY_LOG_FORMAT: ${CITY_LOG_FORMAT:-json}
      CITY_RELEASE_SHA: ${CITY_RELEASE_SHA:?CITY_RELEASE_SHA is required}
      CITY_RELEASE_IMAGE: ${CITY_RELEASE_IMAGE:?CITY_RELEASE_IMAGE is required}
      CITY_RELEASE_VERSION: ${CITY_RELEASE_VERSION:?CITY_RELEASE_VERSION is required}
    secrets:
      - city_database_url
      - redis_url
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ces_network

  backend:
    image: ${CITY_RELEASE_IMAGE:?CITY_RELEASE_IMAGE is required}
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        CITY_RELEASE_SHA: ${CITY_RELEASE_SHA:?CITY_RELEASE_SHA is required}
        CITY_RELEASE_IMAGE: ${CITY_RELEASE_IMAGE:?CITY_RELEASE_IMAGE is required}
        CITY_RELEASE_VERSION: ${CITY_RELEASE_VERSION:?CITY_RELEASE_VERSION is required}
    restart: unless-stopped
    environment:
      CITY_ENV: production
      CITY_DATABASE_URL_FILE: /run/secrets/city_database_url
      REDIS_URL_FILE: /run/secrets/redis_url
      CITY_CORS_ORIGINS: ${CITY_CORS_ORIGINS:?CITY_CORS_ORIGINS is required}
      CITY_DEBUG: "false"
      CITY_ENABLE_FROZEN_ROUTES: "false"
      CITY_SCHEDULER_LOCK_TTL_SECONDS: ${CITY_SCHEDULER_LOCK_TTL_SECONDS:-60}
      CITY_SCHEDULER_LOCK_RENEW_SECONDS: ${CITY_SCHEDULER_LOCK_RENEW_SECONDS:-15}
      CITY_SCHEDULER_LOCK_RETRY_SECONDS: ${CITY_SCHEDULER_LOCK_RETRY_SECONDS:-5}
      CITY_LOG_FORMAT: ${CITY_LOG_FORMAT:-json}
      CITY_RUN_MIGRATIONS_ON_STARTUP: "false"
      CITY_RELEASE_SHA: ${CITY_RELEASE_SHA:?CITY_RELEASE_SHA is required}
      CITY_RELEASE_IMAGE: ${CITY_RELEASE_IMAGE:?CITY_RELEASE_IMAGE is required}
      CITY_RELEASE_VERSION: ${CITY_RELEASE_VERSION:?CITY_RELEASE_VERSION is required}
    secrets:
      - city_database_url
      - redis_url
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ces_network

  prometheus:
    image: prom/prometheus:v2.55.1
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./deploy/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT:-9090}:9090"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - ces_network

  grafana:
    image: grafana/grafana-oss:11.4.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD__FILE: /run/secrets/grafana_admin_password
      GF_USERS_ALLOW_SIGN_UP: "false"
    secrets:
      - grafana_admin_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3001}:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - ces_network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  ces_network:
    driver: bridge

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_FILE:?POSTGRES_PASSWORD_FILE is required}
  redis_password:
    file: ${REDIS_PASSWORD_FILE:?REDIS_PASSWORD_FILE is required}
  city_database_url:
    file: ${CITY_DATABASE_URL_FILE:?CITY_DATABASE_URL_FILE is required}
  redis_url:
    file: ${REDIS_URL_FILE:?REDIS_URL_FILE is required}
  grafana_admin_password:
    file: ${GRAFANA_ADMIN_PASSWORD_FILE:?GRAFANA_ADMIN_PASSWORD_FILE is required}
