repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.0
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet-format
        entry: C:/tools/dotnet-sdk/dotnet.exe
        language: system
        files: \.cs$
        args: ["format", "client/city_economic_simulator.csproj", "--verify-no-changes"]
        pass_filenames: false
