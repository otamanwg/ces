repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: ["--maxkb=1000"]

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black
        language_version: python3.13
        files: ^backend/
        args: ["--line-length=120"]

  - repo: local
    hooks:
      - id: dotnet-format
        name: dotnet-format
        entry: C:/tools/dotnet-sdk/dotnet.exe
        language: system
        files: \.cs$
        args: ["format", "client/city_economic_simulator.csproj", "--verify-no-changes"]
        pass_filenames: false
