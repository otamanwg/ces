services:
  postgres:
    image: postgres:16
    container_name: city-economic-simulator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: city
      POSTGRES_PASSWORD: city_dev_password
      POSTGRES_DB: city_game
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U city -d city_game"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
